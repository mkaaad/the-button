services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - backend-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    networks:
      - backend-network
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge