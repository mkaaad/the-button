services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=""
      - REDIS_DB=0
    depends_on:
      - redis
    networks:
      - backend-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    networks:
      - backend-network
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge